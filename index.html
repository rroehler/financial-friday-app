<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Financial Friday</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0f0d;
    --card: #131a16;
    --card-2: #1a2420;
    --accent: #3fbf83;
    --accent-dim: #1a3a2c;
    --text: #e8ece9;
    --text-dim: #7a8580;
    --text-faint: #4d5651;
    --danger: #e0665a;
    --border: #1a1f1c;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    height: 100%;
  }
  a { color: inherit; text-decoration: none; }
  input, select, button { font-family: inherit; }

  #app { display: flex; flex-direction: column; height: 100vh; }

  .login-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .login-card { width: 100%; max-width: 340px; }
  .login-title { text-align: center; margin-bottom: 28px; }
  .login-title .mark { font-size: 32px; font-weight: 700; color: var(--accent); margin: 0; }
  .login-title p { color: var(--text-dim); font-size: 13px; margin: 4px 0 0; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }
  .field input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 15px;
  }
  .field input:focus { outline: none; border-color: var(--accent); }
  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: #06120c;
    border: none;
    border-radius: 12px;
    padding: 13px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 6px;
  }
  .btn-primary:active { opacity: 0.85; }
  .login-error { color: var(--danger); font-size: 13px; text-align: center; min-height: 18px; margin-top: 10px; }

  .app-shell { display: none; flex-direction: column; height: 100%; }
  .app-shell.active { display: flex; }

  .topbar { padding: 18px 20px 4px; display: flex; justify-content: space-between; align-items: flex-start; }
  .topbar .greeting p:first-child { font-size: 12px; color: var(--text-dim); margin: 0 0 2px; }
  .topbar .greeting p:last-child { font-size: 17px; font-weight: 600; margin: 0; }
  .logout-btn { background: none; border: 1px solid var(--border); color: var(--text-dim); border-radius: 10px; padding: 6px 12px; font-size: 12px; cursor: pointer; }

  .content { flex: 1; overflow-y: auto; padding: 4px 20px 20px; }
  .tab-view { display: none; }
  .tab-view.active { display: block; }

  .hero { text-align: center; padding: 18px 0 6px; }
  .hero .label { font-size: 12px; color: var(--text-dim); letter-spacing: 0.03em; margin: 0 0 6px; }
  .hero .value { font-size: 36px; font-weight: 700; margin: 0; }
  .hero .delta { font-size: 12px; margin: 8px 0 0; }
  .delta.up { color: var(--accent); }
  .delta.down { color: var(--danger); }

  .trend-wrap { position: relative; height: 90px; margin: 6px 0 18px; }

  .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 22px; }
  .metric-card { background: var(--card); border-radius: 14px; padding: 14px; }
  .metric-card .m-label { font-size: 11px; color: var(--text-dim); margin: 0 0 4px; }
  .metric-card .m-value { font-size: 17px; font-weight: 600; margin: 0; }

  .section-label { font-size: 12px; color: var(--text-dim); letter-spacing: 0.03em; margin: 0 0 12px; }

  .spend-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .spend-icon { width: 32px; height: 32px; border-radius: 10px; background: var(--accent-dim); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .spend-icon i { font-size: 16px; color: var(--accent); }
  .spend-row .s-name { font-size: 13px; margin: 0; flex: 1; }
  .spend-row .s-amount { font-size: 13px; margin: 0; }

  .placeholder-view { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; text-align: center; color: var(--text-faint); }
  .placeholder-view i { font-size: 36px; margin-bottom: 12px; opacity: 0.5; }
  .placeholder-view p { font-size: 13px; margin: 0; }

  .bottom-nav { display: flex; border-top: 1px solid var(--border); padding: 10px 4px calc(14px + env(safe-area-inset-bottom)); background: #0e1411; }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; cursor: pointer; padding: 4px 0; }
  .nav-item i { font-size: 22px; color: var(--text); opacity: 0.45; }
  .nav-item span { font-size: 10px; color: var(--text-dim); }
  .nav-item.active i { color: var(--accent); opacity: 1; }
  .nav-item.active span { color: var(--accent); font-weight: 600; }
</style>
</head>
<body>

<div id="app">

  <div class="login-screen" id="login-screen">
    <div class="login-card">
      <div class="login-title">
        <p class="mark">Financial Friday</p>
        <p>Log in to your dashboard</p>
      </div>
      <div class="field">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" autocomplete="username">
      </div>
      <div class="field">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" autocomplete="current-password">
      </div>
      <button class="btn-primary" id="login-btn">Log in</button>
      <p class="login-error" id="login-error"></p>
    </div>
  </div>

  <div class="app-shell" id="app-shell">
    <div class="topbar">
      <div class="greeting">
        <p id="greeting-time">Good evening</p>
        <p>Ryan</p>
      </div>
      <button class="logout-btn" id="logout-btn">Log out</button>
    </div>

    <div class="content">

      <div class="tab-view active" id="view-overview">
        <div class="hero">
          <p class="label">NET WORTH</p>
          <p class="value" id="hero-networth">$0</p>
          <p class="delta" id="hero-delta"></p>
        </div>
        <div class="trend-wrap"><canvas id="trend-chart"></canvas></div>

        <div class="metric-grid">
          <div class="metric-card">
            <p class="m-label">Cash</p>
            <p class="m-value" id="metric-cash">$0</p>
          </div>
          <div class="metric-card">
            <p class="m-label">Debt</p>
            <p class="m-value" id="metric-debt">$0</p>
          </div>
        </div>

        <p class="section-label">TOP SPENDING THIS MONTH</p>
        <div id="top-spending-list"></div>
      </div>

      <div class="tab-view" id="view-accounts">
        <div class="placeholder-view">
          <i class="ti ti-building-bank" aria-hidden="true"></i>
          <p>Accounts tab &mdash; coming in the next build step</p>
        </div>
      </div>

      <div class="tab-view" id="view-budget">
        <div class="placeholder-view">
          <i class="ti ti-calendar-dollar" aria-hidden="true"></i>
          <p>Monthly Budget &mdash; coming soon</p>
        </div>
      </div>

      <div class="tab-view" id="view-debt">
        <div class="placeholder-view">
          <i class="ti ti-trending-down" aria-hidden="true"></i>
          <p>Debt Plan &mdash; coming soon</p>
        </div>
      </div>

      <div class="tab-view" id="view-weekly">
        <div class="placeholder-view">
          <i class="ti ti-calendar-check" aria-hidden="true"></i>
          <p>Weekly Tracker &mdash; coming soon</p>
        </div>
      </div>

    </div>

    <div class="bottom-nav">
      <button class="nav-item active" data-view="overview">
        <i class="ti ti-chart-donut-2" aria-hidden="true"></i>
        <span>Overview</span>
      </button>
      <button class="nav-item" data-view="accounts">
        <i class="ti ti-building-bank" aria-hidden="true"></i>
        <span>Accounts</span>
      </button>
      <button class="nav-item" data-view="budget">
        <i class="ti ti-calendar-dollar" aria-hidden="true"></i>
        <span>Budget</span>
      </button>
      <button class="nav-item" data-view="debt">
        <i class="ti ti-trending-down" aria-hidden="true"></i>
        <span>Debt plan</span>
      </button>
      <button class="nav-item" data-view="weekly">
        <i class="ti ti-calendar-check" aria-hidden="true"></i>
        <span>Weekly</span>
      </button>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import {
    getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
  import {
    getFirestore, doc, getDoc, collection, query, orderBy, getDocs
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB4Z_Wt6_zizqjbnVrSI2GQt1IF3mQ6ToA",
    authDomain: "my-personal-website-7d2f7.firebaseapp.com",
    projectId: "my-personal-website-7d2f7",
    storageBucket: "my-personal-website-7d2f7.firebasestorage.app",
    messagingSenderId: "69240259654",
    appId: "1:69240259654:web:c5c4eaf3f2b3c9e230f647"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const loginScreen = document.getElementById('login-screen');
  const appShell = document.getElementById('app-shell');
  const loginError = document.getElementById('login-error');

  function fmt(n) {
    return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  }

  function setGreeting() {
    const hour = new Date().getHours();
    const el = document.getElementById('greeting-time');
    if (hour < 12) el.textContent = 'Good morning';
    else if (hour < 18) el.textContent = 'Good afternoon';
    else el.textContent = 'Good evening';
  }

  async function attemptLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    loginError.textContent = '';
    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch (err) {
      loginError.textContent = 'Login failed — check email/password.';
    }
  }
  document.getElementById('login-btn').addEventListener('click', attemptLogin);
  ['login-email', 'login-password'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); attemptLogin(); }
    });
  });
  document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('view-' + btn.dataset.view).classList.add('active');
    });
  });

  onAuthStateChanged(auth, (user) => {
    if (user) {
      loginScreen.style.display = 'none';
      appShell.classList.add('active');
      setGreeting();
      loadOverview();
    } else {
      loginScreen.style.display = 'flex';
      appShell.classList.remove('active');
    }
  });

  let trendChart;

  async function loadOverview() {
    const acctSnap = await getDoc(doc(db, 'budget', 'accounts'));
    const acct = acctSnap.exists() ? acctSnap.data() : { navyFederal: 0, purdueFCU: 0, savorOne: 0, oneKey: 0 };
    const cash = (Number(acct.navyFederal) || 0) + (Number(acct.purdueFCU) || 0);
    const debt = (Number(acct.savorOne) || 0) + (Number(acct.oneKey) || 0);
    const netWorth = cash - debt;

    document.getElementById('hero-networth').textContent = (netWorth < 0 ? '-' : '') + fmt(Math.abs(netWorth));
    document.getElementById('metric-cash').textContent = fmt(cash);
    document.getElementById('metric-debt').textContent = fmt(debt);

    const logSnap = await getDocs(query(collection(db, 'budget', 'weeklyLog', 'entries'), orderBy('date', 'asc')));
    const trendData = [];
    logSnap.forEach(d => {
      const w = d.data();
      const wc = (Number(w.navyFederal)||0) + (Number(w.purdueFCU)||0);
      const wd = (Number(w.savorOne)||0) + (Number(w.oneKey)||0);
      trendData.push(wc - wd);
    });
    trendData.push(netWorth);

    if (trendData.length >= 2) {
      const delta = trendData[trendData.length - 1] - trendData[trendData.length - 2];
      const deltaEl = document.getElementById('hero-delta');
      deltaEl.textContent = (delta >= 0 ? '▲ ' : '▼ ') + fmt(Math.abs(delta)) + ' this week';
      deltaEl.className = 'delta ' + (delta >= 0 ? 'up' : 'down');
    }

    if (trendChart) trendChart.destroy();
    trendChart = new Chart(document.getElementById('trend-chart'), {
      type: 'line',
      data: {
        labels: trendData.map(() => ''),
        datasets: [{
          data: trendData,
          borderColor: '#3fbf83',
          backgroundColor: 'rgba(63,191,131,0.12)',
          borderWidth: 2,
          pointRadius: 0,
          tension: 0.35,
          fill: true
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { x: { display: false }, y: { display: false } }
      }
    });

    const monthKey = new Date().toISOString().slice(0, 7);
    const mbSnap = await getDoc(doc(db, 'budget', 'monthlyBudget', 'months', monthKey));
    const mb = mbSnap.exists() ? mbSnap.data() : {};

    const spendCategories = [
      { key: 'mb-purdue-groceries-actual', label: 'Groceries', icon: 'ti-shopping-cart' },
      { key: 'mb-purdue-gas-actual', label: 'Gas', icon: 'ti-gas-station' },
      { key: 'mb-purdue-dining-actual', label: 'Dining', icon: 'ti-coffee' },
      { key: 'mb-purdue-prescription-actual', label: 'Prescriptions', icon: 'ti-pill' },
      { key: 'mb-purdue-clothing-actual', label: 'Clothing', icon: 'ti-shirt' },
      { key: 'mb-purdue-pet-actual', label: 'Pet', icon: 'ti-paw' },
      { key: 'mb-purdue-entertainment-actual', label: 'Entertainment', icon: 'ti-device-tv' },
      { key: 'mb-purdue-amazon-actual', label: 'Amazon', icon: 'ti-package' },
      { key: 'mb-purdue-travel-actual', label: 'Travel', icon: 'ti-plane' },
      { key: 'mb-purdue-misc-actual', label: 'Misc', icon: 'ti-dots' }
    ];
    const top = spendCategories
      .map(c => ({ ...c, value: Number(mb[c.key]) || 0 }))
      .filter(c => c.value > 0)
      .sort((a, b) => b.value - a.value)
      .slice(0, 5);

    const listEl = document.getElementById('top-spending-list');
    listEl.innerHTML = top.length === 0
      ? '<p style="color:var(--text-faint); font-size:13px;">No spending logged yet this month.</p>'
      : top.map(c => `
        <div class="spend-row">
          <div class="spend-icon"><i class="ti ${c.icon}" aria-hidden="true"></i></div>
          <p class="s-name">${c.label}</p>
          <p class="s-amount">${fmt(c.value)}</p>
        </div>
      `).join('');
  }
</script>

</body>
</html>
